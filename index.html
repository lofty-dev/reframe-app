<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stride" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" id="theme-color-meta" content="#0f1117" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #0f1117;
        padding-top: env(safe-area-inset-top);
        overflow-x: hidden;
      }
      #root {
        height: 100%;
      }
      ::-webkit-scrollbar { display: none; }
    </style>
    <script>
      (function () {
        try {
          var bg = localStorage.getItem('stride_theme') === 'light' ? '#f5f7fa' : '#0f1117';
          document.documentElement.style.backgroundColor = bg;
          document.body && (document.body.style.backgroundColor = bg);
          var m = document.getElementById('theme-color-meta');
          if (m) m.content = bg;
        } catch (e) {}
      })();
    </script>
    <title>Stride</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D38V0X6H9H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-D38V0X6H9H');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
