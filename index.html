<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stride" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" id="theme-color-meta" content="#0f1117" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: var(--app-bg, #0f1117);
        padding-top: env(safe-area-inset-top);
        overflow-x: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      #root {
        height: 100%;
        background-color: var(--app-bg, #0f1117);
      }
      ::-webkit-scrollbar { display: none; }
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0f1117;
        transition: opacity 0.35s ease;
      }
      #splash-screen.splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #38bdf8;
      }
      #splash-loading {
        margin-top: 14px;
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
        font-size: 13px;
        color: #6b7280;
      }
      #splash-spinner {
        width: 13px;
        height: 13px;
        border: 2px solid #2a2d3e;
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function () {
        try {
          var bg = localStorage.getItem('stride_theme') === 'light' ? '#f5f7fa' : '#0f1117';
          document.documentElement.style.setProperty('--app-bg', bg);
          var m = document.getElementById('theme-color-meta');
          if (m) m.content = bg;
        } catch (e) {}
      })();
    </script>
    <title>Stride</title>

        "ストレス記録",

  </head>
  <body>
    <div id="splash-screen">
      <div id="splash-title">Stride</div>
      <div id="splash-loading">
        <span id="splash-spinner"></span>
        <span>読み込み中...</span>
      </div>
    </div>

</html>
